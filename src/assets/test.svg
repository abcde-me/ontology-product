<svg
        width="48"
        height="48"
        viewBox="0 0 58 58"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
>
    <defs>
        <!-- 外阴影 -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0.4" dy="1.6" stdDeviation="2.4" flood-opacity="0.1"/>
        </filter>

        <!-- 内部柔光 -->
        <filter id="softBlur">
            <feGaussianBlur stdDeviation="2"/>
        </filter>

        <!-- 半透明渐变（模拟玻璃） -->
        <linearGradient id="glassGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="white" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#C2D5FF" stop-opacity="0.6"/>
        </linearGradient>

        <clipPath id="fileClip">
            <rect x="8.4" y="6.2" width="40" height="42" rx="4"/>
        </clipPath>
    </defs>

    <!-- 背景文件底 -->
    <rect
            x="8.4"
            y="6.2"
            width="40"
            height="42"
            rx="4"
            fill="#92B3FC"
            filter="url(#shadow)"
    />

    <!-- 文件主体 -->
    <g clip-path="url(#fileClip)">
        <path
                d="M8.4 20.2H19.19C21.2 20.2 23.07 21.2 24.18 22.87L25.21 24.42C25.95 25.53 27.2 26.2 28.54 26.2H48.4V44.2C48.4 46.41 46.61 48.2 44.4 48.2H12.4C10.19 48.2 8.4 46.41 8.4 44.2V20.2Z"
                fill="url(#glassGradient)"
        />

        <!-- 柔光层（模拟原来的模糊感） -->
        <rect
                x="8.4"
                y="20.2"
                width="40"
                height="28"
                fill="white"
                opacity="0.15"
                filter="url(#softBlur)"
        />
    </g>

    <!-- 文件折角 -->
    <rect
            x="24.4"
            y="14.2"
            width="4"
            height="8"
            rx="2"
            transform="rotate(-90 24.4 14.2)"
            fill="#F5F6FA"
    />
</svg>
