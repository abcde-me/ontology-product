<style id="appforge_home">
  .appforge-app .appforge-app-title {
    font-size: 18px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 4px;
  }
  .appforge-app .appforge-app-des {
    color: #7f8c9f;
    margin-bottom: 8px;
  }
  .appforge-app .appforge-app-panel {
    display: flex;
  }
  .appforge-app .appforge-app-panel .usechat {
    flex: 0 0 180px;
    background: rgb(var(--link-1));
    padding: 12px;
    margin-right: 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--color-border-1);
    color: var(--color-text-5);
    position: relative;
  }
  .appforge-app .appforge-app-panel .usechat::after {
    display: block;
    content: '';
    position: absolute;
    bottom: 0;
    right: 0;
    width: 96px;
    height: 96px;
    background-image: var(--appforge_assets_png1);
    background-size: cover;
  }
  .appforge-app .appforge-app-panel .usechat:hover {
    background: linear-gradient(270deg, #40b0fe 0%, #2761f3 100%);
    color: white;
  }
  .appforge-app .appforge-app-panel .usechat .usechat-title {
    font-size: 14px;
    margin-bottom: 4px;
    color: var(--color-text-3);
  }
  .appforge-app .appforge-app-panel .usechat:hover .usechat-title {
    color: white;
  }
  .appforge-app .appforge-app-panel .right-containter {
    display: flex;
    flex: auto;
    overflow: auto;
    flex-direction: column;
  }
  .appforge-app .appforge-app-panel .right-containter .right-container-item {
    flex: 1;
    margin-bottom: 8px;
    background: rgb(var(--link-1));
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--color-border-1);
    position: relative;
    color: var(--color-text-5);
    display: flex;
    align-items: center;
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item:hover {
    color: white;
    background: linear-gradient(270deg, #40b0fe 0%, #2761f3 100%);
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item
    .icon {
    width: 55px;
    height: 55px;
    background-size: cover;
    margin-left: auto;
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item.app
    .icon {
    background-image: var(--appforge_assets_png2);
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item.tool
    .icon {
    background-image: var(--appforge_assets_png3);
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item:last-child {
    margin-bottom: 0;
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item
    .item-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-text-3);
  }
  .appforge-app
    .appforge-app-panel
    .right-containter
    .right-container-item:hover
    .item-title {
    color: white;
  }
</style>
<div class="appforge-app">
  <div class="appforge-app-title">你好，欢迎来到AppForge</div>
  <div class="appforge-app-des">
    AppForge
    代表着AI应用程序开发的新纪元，它为拥有创意的你提供了一个简便快捷、门槛极低的平台，让你能够迅速构建自己的AI
    App，并轻松一键上架至应用商店！
  </div>
  <div class="appforge-app-panel">
    <div class="usechat">
      <div class="usechat-title">对话式创建应用</div>
      <div>通过跟AppForge对话的方式，开始创建一个应用</div>
    </div>
    <div class="right-containter">
      <div
        class="right-container-item app"
        onclick="appforge_gotoStore('/tenant/compute/appforge/appStore')"
      >
        <div>
          <div class="item-title">应用商店</div>
          <div>可以去应用商店找找灵感</div>
        </div>
        <div class="icon"></div>
      </div>
      <div
        class="right-container-item tool"
        onclick="appforge_gotoStore('/tenant/compute/appforge/toolStore')"
      >
        <div>
          <div class="item-title">插件商店</div>
          <div>去插件商店找找看，你的应用需要哪些插件</div>
        </div>
        <div class="icon"></div>
      </div>
    </div>
  </div>
</div>
