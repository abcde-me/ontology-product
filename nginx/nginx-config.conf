server {
        listen      80;
        server_name 127.0.0.1;
        client_max_body_size 1024M;
        gzip on;
        gzip_min_length 1k;
        gzip_buffers 4 16k;
        gzip_comp_level 4;
        gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript image/jpeg image/gif image/png;
        gzip_vary off;
        gzip_disable "MSIE [1-6]\.";
        index index.php index.html index.htm;

        location = / {
            return 302 modaforge/;
        }

	    # 前端路径映射
        location /modaforge {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS,DELETE,PUT,HEAD";
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /modaforge/index.html =404;
            if ($request_filename ~* .*\.(?:htm|html)$){
                expires -1s;
                add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate";
            }
            if ($request_filename ~* .*\.(?:js|css)$)
            {
                expires 30d;
            }
            if ($request_filename ~* .*\.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm)$)
            {
                expires 30d;
            }
        }

        # TODO: 1.1.4版本临时方案，后续删除，PreviewTaskFile接口设置5分钟超时
        location /ceai/label-service/api/v1/PreviewTaskFile {
            proxy_pass http://apisix-gateway.apisix.svc.cluster.local:80/label-service/api/v1/PreviewTaskFile;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3000s;
            proxy_send_timeout 3000s;
            proxy_read_timeout 3000s;
        }

        # TODO: 1.1.4版本临时方案，后续删除，AIRecognition接口设置5分钟超时
